<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Para ti, preciosa 🖤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>

/* ============================================================
   RESET GLOBAL
   Elimina márgenes y paddings por defecto de todos los elementos
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ============================================================
   BODY — Fondo general de la página
   · background: color base (puedes cambiarlo aquí)
   · padding-bottom: espacio al final para que no quede pegado
   ============================================================ */
body {
  min-height: 100vh;
  background: #edf4ef;
  font-family: 'Lato', sans-serif;
  overflow-x: hidden;
  position: relative;
  padding-bottom: 4rem;
}

/* ============================================================
   GRADIENTES DE FONDO DECORATIVOS
   Burbujas de color suave que dan profundidad al fondo.
   Puedes ajustar los colores rgba() o los porcentajes de posición.
   ============================================================ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 10%, rgba(159,225,203,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 80%, rgba(197,184,232,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 60% 40%, rgba(214,237,217,0.15) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ============================================================
   PARTÍCULAS AL HACER CLICK
   Hojitas y flores que salen al tocar la pantalla.
   · flyUp: animación de vuelo hacia arriba y desvanecimiento
   · Las variables --tx, --ty, --rot, --dur, --fs se asignan
     desde JavaScript para que cada partícula sea única
   ============================================================ */
.particle {
  position: fixed;
  pointer-events: none;
  z-index: 999;
  font-size: var(--fs, 1.2rem);
  animation: flyUp var(--dur, 1.2s) ease-out forwards;
  user-select: none;
}
@keyframes flyUp {
  0%   { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
  60%  { opacity: 1; }
  100% { transform: translate(var(--tx, 0px), var(--ty, -120px)) rotate(var(--rot, 180deg)) scale(0.4); opacity: 0; }
}

/* ============================================================
   HOJAS DECORATIVAS DE FONDO
   Emojis fijos en los bordes de la pantalla que se mecen.
   · --s: tamaño · --o: opacidad · --d: duración animación
   · --r1, --r2: ángulos de balanceo
   Se definen en el HTML con style="..."
   ============================================================ */
.deco-leaf {
  position: fixed;
  font-size: var(--s, 2rem);
  opacity: var(--o, 0.12);
  pointer-events: none;
  z-index: 0;
  animation: sway var(--d, 8s) ease-in-out infinite alternate;
  transform-origin: bottom center;
}
@keyframes sway {
  0%   { transform: rotate(var(--r1, -6deg)); }
  100% { transform: rotate(var(--r2, 6deg)); }
}

/* ============================================================
   HEADER / HERO
   Título principal de la página.
   · hero-eyebrow: etiqueta pequeña arriba del título
   · hero-title: título grande "Para ti, preciosa"
   · hero-sub: subtítulo pequeño debajo
   · hero-orquidea: flor SVG decorativa
   · hero-divider: línea divisora con ✿
   ============================================================ */
.hero {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 3.5rem 2rem 1.5rem;
}

.hero-eyebrow {
  display: inline-block;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #1D9E75;         /* ← color del texto de la etiqueta */
  font-weight: 700;
  margin-bottom: 1rem;
  border: 1.5px solid #9FE1CB;
  padding: 0.35rem 1.2rem;
  border-radius: 999px;
  background: rgba(159,225,203,0.15);
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 6vw, 3.4rem); /* responsive: mínimo 2rem, máximo 3.4rem */
  color: #085041;         /* ← color del título principal */
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 0.4rem;
}
.hero-title em {
  font-style: italic;
  color: #1D9E75;         /* ← color de "preciosa" en cursiva */
}

.hero-sub {
  font-size: 13px;
  color: #5DCAA5;         /* ← color del subtítulo */
  font-weight: 400;
  letter-spacing: 0.06em;
  margin-top: 0.5rem;
}

.hero-orquidea {
  display: block;
  margin: 1.2rem auto 0;
  width: 72px;
  height: 72px;
}

.hero-divider {
  margin: 1.5rem auto 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  max-width: 280px;
  color: #9FE1CB;
  font-size: 16px;
  letter-spacing: 6px;
}
.hero-divider::before,
.hero-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, #9FE1CB);
}
.hero-divider::after {
  background: linear-gradient(to left, transparent, #9FE1CB);
}

/* ============================================================
   GRID — Contenedor del calendario
   · max-width: ancho máximo del grid
   · minmax(138px, 1fr): cada cajita mínimo 138px, máximo igual
     Si quieres cajitas más grandes, sube el 138px
   · gap: espacio entre cajitas
   ============================================================ */
.grid-wrap {
  max-width: 920px;
  margin: 2rem auto 0;
  padding: 0 1.5rem 3rem;
  position: relative;
  z-index: 2;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
  gap: 14px;
}

/* ============================================================
   CAJITA BASE
   · aspect-ratio: 1 = cuadrada perfecta
   · border-radius: redondez de las esquinas
   · box-shadow: sombra suave
   ============================================================ */
.box {
  aspect-ratio: 1;
  border-radius: 22px;
  border: 2px solid #b8ddd0;
  background: #ffffff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
  box-shadow: 0 3px 14px rgba(29,158,117,0.12);
}

/* Brillo interno decorativo */
.box::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.6), transparent 65%);
  pointer-events: none;
}

/* ── VARIANTES DE COLOR POR CAJITA ──
   Cada 4 cajitas rota entre estos 4 colores.
   Para cambiar los colores, edita background y border-color aquí.
   4n   = cajitas 4, 8, 12, 16, 20, 24  → verde menta
   4n+1 = cajitas 1, 5, 9, 13, 17, 21   → lavanda rosado
   4n+2 = cajitas 2, 6, 10, 14, 18, 22  → lavanda azul
   4n+3 = cajitas 3, 7, 11, 15, 19, 23  → amarillo suave
   ============================================================ */
.box:nth-child(4n)   { background: #e2f5eb; border-color: #8ed4b4; }
.box:nth-child(4n+1) { background: #f3e6f8; border-color: #d4a8e0; }
.box:nth-child(4n+2) { background: #eae7ff; border-color: #b8aee8; }
.box:nth-child(4n+3) { background: #fff3d6; border-color: #e8c878; }

/* Efecto hover en cajitas desbloqueadas */
.box:not(.locked):hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow: 0 16px 36px rgba(29,158,117,0.15), 0 0 0 1.5px #5DCAA5;
  border-color: #5DCAA5;
  z-index: 3;
}

/* Número del día dentro de la cajita */
.box-day {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;    /* ← tamaño del número */
  font-weight: 400;
  color: #5DCAA5;       /* ← color del número en reposo */
  line-height: 1;
  position: relative;
  z-index: 1;
  transition: color 0.2s;
}
.box:not(.locked):hover .box-day,
.box.open .box-day { color: #085041; } /* ← color al hover o abierta */

/* Emoji debajo del número */
.box-emoji {
  font-size: 1.4rem;
  position: relative;
  z-index: 1;
  transition: transform 0.3s ease;
}
.box:not(.locked):hover .box-emoji { transform: scale(1.3) rotate(-8deg); }

/* Texto "DÍA X" debajo del emoji */
.box-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #9FE1CB;
  position: relative;
  z-index: 1;
  transition: color 0.2s;
}
.box:not(.locked):hover .box-label { color: #1D9E75; }

/* ── CAJITA BLOQUEADA ──
   Días que aún no se pueden abrir.
   · opacity: qué tan transparente se ve (0 = invisible, 1 = sólido)
   ============================================================ */
.box.locked {
  cursor: default;
  opacity: 0.65;
  background: #eef5f1;
  border-color: #bcd8cc;
}
.box.locked .box-day { color: #9FE1CB; }
.box.locked:hover { transform: none; box-shadow: none; }
.lock-icon { font-size: 1rem; position: relative; z-index: 1; opacity: 0.5; }

/* ── CAJITA DE HOY ──
   Resaltada con brillo animado.
   ============================================================ */
.box.today {
  background: linear-gradient(135deg, #e8f8f2, #f5eeff);
  border-color: #1D9E75;
  box-shadow: 0 0 0 1.5px #1D9E75, 0 8px 30px rgba(29,158,117,0.18);
  animation: glowToday 3s ease-in-out infinite alternate;
}
@keyframes glowToday {
  0%   { box-shadow: 0 0 0 1.5px #1D9E75, 0 8px 24px rgba(29,158,117,0.15); }
  100% { box-shadow: 0 0 0 1.5px #5DCAA5, 0 8px 36px rgba(29,158,117,0.28); }
}
.box.today .box-day { color: #1D9E75; }

/* Badge "HOY ✿" en esquina superior derecha */
.today-badge {
  position: absolute;
  top: 0; right: 0;
  background: #1D9E75;
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 0 20px 0 12px;
  z-index: 2;
}

/* ============================================================
   CAJITA ESPECIAL — DÍA 25: EL DÍA QUE SE CONOCEN EN PERSONA
   Siempre visible, con brillo rosado tipo "corazón" y su propio
   modal con cuenta regresiva en vivo.
   ============================================================ */
.box.meta {
  background: linear-gradient(135deg, #ffe3ea, #fff0d6);
  border-color: #ff8fab;
  box-shadow: 0 0 0 1.5px #ff8fab, 0 8px 30px rgba(255,143,171,0.28);
  animation: glowMeta 2.4s ease-in-out infinite alternate;
}
@keyframes glowMeta {
  0%   { box-shadow: 0 0 0 1.5px #ff8fab, 0 8px 24px rgba(255,143,171,0.22); }
  100% { box-shadow: 0 0 0 1.5px #ff5c8a, 0 8px 40px rgba(255,92,138,0.38); }
}
.box.meta .box-day  { color: #ff5c8a; }
.box.meta .box-label { color: #ff5c8a; }
.box.meta:hover .box-day,
.box.meta:hover .box-label { color: #e8447a; }
.box.meta .box-emoji { animation: heartbeat 1.6s ease-in-out infinite; }
@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.25); }
}
.meta-badge {
  position: absolute;
  top: 0; right: 0;
  background: #ff5c8a;
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 0 20px 0 12px;
  z-index: 2;
}

/* Nota informativa debajo del grid */
.note {
  text-align: center;
  margin-top: 1.5rem;
  position: relative;
  z-index: 2;
}
.note p { font-size: 12px; color: #9FE1CB; font-weight: 400; letter-spacing: 0.04em; }

/* Footer */
.footer {
  text-align: center;
  padding: 0 0 3rem;
  position: relative;
  z-index: 2;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 13px;
  color: #9FE1CB;
}

/* ============================================================
   MODAL — Ventana emergente para cajitas bloqueadas
   · modal-bg: fondo oscuro semitransparente con blur
   · modal: tarjeta blanca centrada
   · .show: clase que activa la visibilidad (agrega JS)
   ============================================================ */
.modal-bg {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(8,80,65,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
  backdrop-filter: blur(6px);
}
.modal-bg.show { opacity: 1; pointer-events: all; }

.modal {
  background: #ffffff;
  border: 1.5px solid #9FE1CB;
  border-radius: 28px;
  box-shadow: 0 20px 60px rgba(29,158,117,0.15);
  padding: 2.5rem 2rem;
  text-align: center;
  max-width: 320px;
  width: 90%;
  transform: scale(0.88) translateY(12px);
  transition: transform 0.3s ease;
}
.modal-bg.show .modal { transform: scale(1) translateY(0); }

.modal-flower { display: block; margin: 0 auto 1rem; width: 54px; height: 54px; }

.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  color: #085041;       /* ← color del título del modal */
  font-weight: 400;
  margin-bottom: 0.6rem;
}

.modal-msg {
  font-size: 14px;
  color: #5DCAA5;       /* ← color del mensaje del modal */
  line-height: 1.75;
  margin-bottom: 1rem;
  font-weight: 300;
  font-family: 'Playfair Display', serif;
  font-style: italic;
}

.modal-date {
  font-size: 11px;
  color: #9FE1CB;
  letter-spacing: 0.08em;
  margin-bottom: 1.5rem;
  font-family: 'Lato', sans-serif;
}

.modal-btn {
  background: #1D9E75;
  color: #fff;
  border: 1.5px solid #1D9E75;
  font-family: 'Lato', sans-serif;
  font-size: 14px;
  font-weight: 400;
  padding: 0.65rem 2rem;
  border-radius: 999px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.2s;
}
.modal-btn:hover { background: transparent; color: #1D9E75; }


</style>
</head>
<body>

<!-- ============================================================
     HOJAS DECORATIVAS DE FONDO
     Para agregar más: copia una línea y cambia top/left/right/bottom
     y las variables --s (tamaño), --o (opacidad), --d (velocidad)
     ============================================================ -->
<div class="deco-leaf" style="top:6%;left:2%;--s:3rem;--o:0.1;--d:9s;--r1:-8deg;--r2:6deg">🌿</div>
<div class="deco-leaf" style="top:18%;right:3%;--s:2.5rem;--o:0.09;--d:11s;--r1:5deg;--r2:-10deg">🍃</div>
<div class="deco-leaf" style="bottom:28%;left:1%;--s:3.5rem;--o:0.09;--d:8s;--r1:-5deg;--r2:8deg">🌿</div>
<div class="deco-leaf" style="bottom:12%;right:2%;--s:2.8rem;--o:0.09;--d:10s;--r1:7deg;--r2:-5deg">🍃</div>
<div class="deco-leaf" style="top:52%;right:1%;--s:2rem;--o:0.08;--d:13s;--r1:-3deg;--r2:9deg">🌸</div>
<div class="deco-leaf" style="top:38%;left:0%;--s:2rem;--o:0.08;--d:12s;--r1:4deg;--r2:-7deg">🌸</div>

<!-- ============================================================
     HEADER
     Para cambiar el título principal, edita el h1.
     Para cambiar el subtítulo, edita el <p class="hero-sub">
     ============================================================ -->
<header class="hero">
  <div class="hero-eyebrow">🌿 calendario de adviento · 2026 🌿</div>
  <h1 class="hero-title">Para ti,<br><em>preciosa</em> 🖤</h1>
  <p class="hero-sub">24 días · 24 sorpresas hechas con todo mi amor</p>

  <!-- Orquídea SVG decorativa — no necesitas tocar esto -->
  <svg class="hero-orquidea" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 72 Q48 82 46 92" stroke="#5DCAA5" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M48 82 Q36 78 32 70 Q40 72 48 82Z" fill="#5DCAA5" opacity="0.7"/>
    <path d="M47 86 Q58 85 62 78 Q54 80 47 86Z" fill="#5DCAA5" opacity="0.6"/>
    <ellipse cx="50" cy="38" rx="6" ry="16" fill="#9FE1CB" opacity="0.5" transform="rotate(0 50 50)"/>
    <ellipse cx="50" cy="38" rx="6" ry="16" fill="#9FE1CB" opacity="0.5" transform="rotate(72 50 50)"/>
    <ellipse cx="50" cy="38" rx="6" ry="16" fill="#9FE1CB" opacity="0.5" transform="rotate(144 50 50)"/>
    <ellipse cx="50" cy="38" rx="6" ry="16" fill="#9FE1CB" opacity="0.5" transform="rotate(216 50 50)"/>
    <ellipse cx="50" cy="38" rx="6" ry="16" fill="#9FE1CB" opacity="0.5" transform="rotate(288 50 50)"/>
    <ellipse cx="50" cy="36" rx="5" ry="14" fill="#5DCAA5" opacity="0.8" transform="rotate(36 50 50)"/>
    <ellipse cx="50" cy="36" rx="5" ry="14" fill="#5DCAA5" opacity="0.8" transform="rotate(108 50 50)"/>
    <ellipse cx="50" cy="36" rx="5" ry="14" fill="#5DCAA5" opacity="0.8" transform="rotate(180 50 50)"/>
    <ellipse cx="50" cy="36" rx="5" ry="14" fill="#5DCAA5" opacity="0.8" transform="rotate(252 50 50)"/>
    <ellipse cx="50" cy="36" rx="5" ry="14" fill="#5DCAA5" opacity="0.8" transform="rotate(324 50 50)"/>
    <circle cx="50" cy="50" r="10" fill="#1D9E75"/>
    <circle cx="50" cy="50" r="6" fill="#E1F5EE"/>
    <circle cx="48" cy="48" r="2" fill="#1D9E75"/>
    <circle cx="52" cy="51" r="1.5" fill="#5DCAA5"/>
  </svg>

  <div class="hero-divider">✿ ✿ ✿</div>
</header>

<!-- Grid de cajitas — se genera automáticamente en el JS -->
<div class="grid-wrap">
  <div class="grid" id="grid"></div>
  <div class="note">
    <p>🔒 cada cajita se abre el día que le corresponde · no hagas trampa, preciosa 🌿</p>
  </div>
</div>

<footer class="footer">hecho con todo mi amor · para ti · 2026</footer>

<!-- ============================================================
     MODAL — Ventana emergente para días bloqueados
     El contenido (título, mensaje, fecha) se llena desde JS
     ============================================================ -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <svg class="modal-flower" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="38" rx="6" ry="16" fill="#9FE1CB" opacity="0.5" transform="rotate(0 50 50)"/>
      <ellipse cx="50" cy="38" rx="6" ry="16" fill="#9FE1CB" opacity="0.5" transform="rotate(72 50 50)"/>
      <ellipse cx="50" cy="38" rx="6" ry="16" fill="#9FE1CB" opacity="0.5" transform="rotate(144 50 50)"/>
      <ellipse cx="50" cy="38" rx="6" ry="16" fill="#9FE1CB" opacity="0.5" transform="rotate(216 50 50)"/>
      <ellipse cx="50" cy="38" rx="6" ry="16" fill="#9FE1CB" opacity="0.5" transform="rotate(288 50 50)"/>
      <ellipse cx="50" cy="36" rx="5" ry="14" fill="#5DCAA5" opacity="0.8" transform="rotate(36 50 50)"/>
      <ellipse cx="50" cy="36" rx="5" ry="14" fill="#5DCAA5" opacity="0.8" transform="rotate(108 50 50)"/>
      <ellipse cx="50" cy="36" rx="5" ry="14" fill="#5DCAA5" opacity="0.8" transform="rotate(180 50 50)"/>
      <ellipse cx="50" cy="36" rx="5" ry="14" fill="#5DCAA5" opacity="0.8" transform="rotate(252 50 50)"/>
      <ellipse cx="50" cy="36" rx="5" ry="14" fill="#5DCAA5" opacity="0.8" transform="rotate(324 50 50)"/>
      <circle cx="50" cy="50" r="10" fill="#1D9E75"/>
      <circle cx="50" cy="50" r="6" fill="#E1F5EE"/>
      <circle cx="48" cy="48" r="2" fill="#1D9E75"/>
    </svg>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-date" id="modal-date"></div>
    <button class="modal-btn" onclick="closeModal()">está bien ✿</button>
  </div>
</div>

<script>

// ============================================================
// CONFIGURACIÓN PRINCIPAL
// ============================================================

// ⚠️ MODO PRUEBA vs MODO REAL
// Para probar todos los días sin esperar:
//   → Cambia TEST_MODE = true
//   → Todos los días aparecerán desbloqueados
// Para el calendario real (un día por día):
//   → Cambia TEST_MODE = false
const TEST_MODE = false;

// Fecha de inicio del calendario (día 1)
// START_MONTH: 0=enero, 1=feb, 2=mar, 3=abr, 4=may, 5=jun, 6=jul, 7=ago, 8=sep, 9=oct, 10=nov, 11=dic
const START_YEAR  = 2026;
const START_MONTH = 5;    // ← Junio
const START_DAY   = 1;

// ============================================================
// EMOJIS DE CADA CAJITA
// Orden: día 1 al 24. Puedes cambiar cualquier emoji aquí.
// ============================================================
const EMOJIS = [
  '🌿','🐛','🌸','🍃','🐝','🦋','🌱','🐞',
  '🌺','🍀','🐌','🌻','🌿','🐛','🌸','🍃',
  '🐝','🦋','🌱','🐞','🌺','🍀','🐌','🌟'
];

// ============================================================
// MENSAJES DE CAJITAS BLOQUEADAS
// Un objeto por día (24 en total).
// · title: título grande del modal
// · msg: frase en cursiva debajo
// Para editar: busca el día que quieras y cambia el texto.
// ============================================================
const LOCKED_MESSAGES = [

// ============================================================
// LÓGICA DE FECHAS
// Compara la fecha de cada cajita con la fecha de hoy.
// En TEST_MODE, todas las cajitas aparecen desbloqueadas.
// ============================================================
const today      = new Date();
const localToday = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();

function getBoxTime(day) {
  // Retorna el timestamp de medianoche del día correspondiente
  return new Date(START_YEAR, START_MONTH, START_DAY + day - 1).getTime();
}

function isUnlocked(day) {
  if (TEST_MODE) return true; // En modo prueba, todo abierto
  return getBoxTime(day) <= localToday;
}

function isToday(day) {
  if (TEST_MODE) return day === 1; // En modo prueba, solo el día 1 tiene badge "HOY"
  return getBoxTime(day) === localToday;
}

function boxDateLabel(day) {
  // Devuelve la fecha en formato "1 de junio"
  const d = new Date(START_YEAR, START_MONTH, START_DAY + day - 1);
  return d.toLocaleDateString('es-MX', { day: 'numeric', month: 'long' });
}

// ============================================================
// GENERACIÓN DEL GRID
// Crea cada cajita dinámicamente y la agrega al HTML.
// Los enlaces apuntan a dia-1.html, dia-2.html, etc.
// La cajita 25 es especial: siempre visible, abre la cuenta
// regresiva en vez de un enlace a otra página.
// ============================================================
const grid = document.getElementById('grid');

for (let d = 1; d <= 25; d++) {

  // ── Cajita especial del día 25 ──
  if (d === 25) {
    const meta = document.createElement('a');
    meta.className = 'box meta';
    meta.href = 'dia-25.html'; // ← abre la página especial en pestaña nueva
    meta.target = '_blank';
    meta.rel = 'noopener';
    meta.innerHTML = `
      <div class="meta-badge">especial ✿</div>
      <div class="box-day">25</div>
      <div class="box-emoji">❤️</div>
      <div class="box-label">nos vemos</div>
    `;
    grid.appendChild(meta);
    continue;
  }

  const unlocked = isUnlocked(d);
  const todayBox = isToday(d);
  const emoji    = EMOJIS[d - 1] || '🌿';

  const a = document.createElement('a');
  a.className = 'box' + (unlocked ? (todayBox ? ' today open' : ' open') : ' locked');

  if (unlocked) {
    a.href = `dia-${d}.html`; // ← nombre del archivo de cada día
  } else {
    a.href = '#';
    a.addEventListener('click', e => { e.preventDefault(); openModal(d); });
  }

  a.innerHTML = `
    ${todayBox ? '<div class="today-badge">hoy ✿</div>' : ''}
    <div class="box-day">${d}</div>
    ${unlocked
      ? `<div class="box-emoji">${emoji}</div><div class="box-label">día ${d}</div>`
      : `<div class="lock-icon">🔒</div>`
    }
  `;

  grid.appendChild(a);
}

// ============================================================
// PARTÍCULAS AL HACER CLICK
// Al tocar cualquier parte, salen hojitas desde ese punto.
// · count: cuántas partículas por click (default 8)
// · PARTICLES: emojis que pueden salir
// ============================================================
const PARTICLES = ['🌿','🍃','🌸','🌺','✿','🌱','🍀','🌼'];

function spawnParticles(x, y, count = 8) {
  for (let i = 0; i < count; i++) {
    const el    = document.createElement('span');
    el.className = 'particle';

    const angle = (360 / count) * i + Math.random() * 20;
    const dist  = 60 + Math.random() * 80;
    const tx    = Math.cos(angle * Math.PI / 180) * dist;
    const ty    = Math.sin(angle * Math.PI / 180) * dist - 60;
    const dur   = 0.9 + Math.random() * 0.6;
    const fs    = 0.9 + Math.random() * 0.8;
    const rot   = -180 + Math.random() * 360;

    el.textContent  = PARTICLES[Math.floor(Math.random() * PARTICLES.length)];
    el.style.cssText = `
      left: ${x}px; top: ${y}px;
      --tx: ${tx}px; --ty: ${ty}px;
      --dur: ${dur}s; --fs: ${fs}rem; --rot: ${rot}deg;
    `;

    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove()); // se limpia solo
  }
}

document.addEventListener('click', e => {
  spawnParticles(e.clientX, e.clientY, 8);
});

// ============================================================
// MODAL — Abrir y cerrar
// openModal(day): muestra el modal con el mensaje del día
// closeModal(): lo cierra
// También se cierra al hacer click fuera del modal
// ============================================================
function openModal(day) {
  const msg = LOCKED_MESSAGES[day - 1];
  document.getElementById('modal-title').textContent = msg.title;
  document.getElementById('modal-msg').textContent   = msg.msg;
  document.getElementById('modal-date').textContent  = 'se abre el ' + boxDateLabel(day);
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

// Click fuera del modal lo cierra
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

</script>
