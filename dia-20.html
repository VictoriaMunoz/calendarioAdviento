<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Día 20 — Una orquídea hecha de palabras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fdf4f7;min-height:100vh;font-family:'Lato',sans-serif;overflow-x:hidden;}

.bg{position:fixed;inset:0;z-index:0;overflow:hidden;}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.14;animation:drift var(--d,14s) ease-in-out infinite alternate;}
@keyframes drift{0%{transform:translate(0,0);}100%{transform:translate(var(--tx,20px),var(--ty,-20px));}}

.hero{position:relative;z-index:2;padding:4rem 2rem 1.5rem;text-align:center;}
.hero-day{font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:#8a3a6a;margin-bottom:0.75rem;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:300;color:#3a0a28;line-height:1.2;margin-bottom:0.4rem;}
.hero-title em{font-style:italic;color:#c4609a;}
.hero-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:rgba(58,10,40,0.45);max-width:380px;margin:0.5rem auto 0;line-height:1.7;}
.hero-hint{font-size:12px;color:#d4a0c4;letter-spacing:0.08em;margin-top:1.25rem;}

.orchid-wrap{position:relative;z-index:2;max-width:440px;margin:1.5rem auto 0;padding:0 1rem;}
.orchid-svg{width:100%;display:block;}

.petal{cursor:pointer;transition:all 0.3s ease;transform-origin:center;}
.petal:hover{filter:drop-shadow(0 0 12px rgba(196,96,154,0.5));}
.petal.active{filter:drop-shadow(0 0 20px rgba(196,96,154,0.7));}
.petal.dimmed{opacity:0.2;}

.petal-num{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:400;fill:rgba(255,255,255,0.8);pointer-events:none;text-anchor:middle;dominant-baseline:central;}

.progress{display:flex;gap:8px;justify-content:center;margin:1.5rem 0;position:relative;z-index:2;}
.progress-dot{width:8px;height:8px;border-radius:50%;background:#f0d4e8;transition:background 0.4s, transform 0.3s;}
.progress-dot.done{background:#8a3a6a;transform:scale(1.2);}

.phrase-panel{
  max-width:520px;margin:0 auto;padding:0 2rem;
  position:relative;z-index:2;
  min-height:160px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.phrase-num{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#8a3a6a;margin-bottom:0.75rem;font-family:'Lato',sans-serif;opacity:0;transition:opacity 0.4s ease;}
.phrase-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.3rem,3.5vw,1.9rem);font-weight:400;color:#3a0a28;text-align:center;line-height:1.3;margin-bottom:0.75rem;opacity:0;transform:translateY(8px);transition:opacity 0.5s ease, transform 0.5s ease;}
.phrase-text{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;font-style:italic;color:rgba(58,10,40,0.7);text-align:center;line-height:1.85;opacity:0;transform:translateY(8px);transition:opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;}
.phrase-panel.active .phrase-num{opacity:1;}
.phrase-panel.active .phrase-title{opacity:1;transform:translateY(0);}
.phrase-panel.active .phrase-text{opacity:1;transform:translateY(0);}
.phrase-hint{font-size:13px;color:#d4a0c4;font-style:italic;font-family:'Cormorant Garamond',serif;text-align:center;padding-top:1rem;transition:opacity 0.3s;}

.divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,#d4a0c4,transparent);margin:1.25rem auto;}

.closing{max-width:500px;margin:1rem auto 0;padding:0 2rem 5rem;text-align:center;position:relative;z-index:2;opacity:0;transition:opacity 1s ease;}
.closing.visible{opacity:1;}
.closing-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3vw,1.7rem);font-weight:300;font-style:italic;color:#3a0a28;line-height:1.9;margin-bottom:1.25rem;}
.closing-firma{font-family:'Cormorant Garamond',serif;font-size:14px;color:rgba(58,10,40,0.35);letter-spacing:0.08em;}
.bottom-deco{text-align:center;color:#d4a0c4;font-size:18px;letter-spacing:10px;margin-top:1.5rem;}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-blob" style="width:500px;height:500px;background:#d4a0c4;top:-100px;left:-100px;--d:16s;--tx:30px;--ty:20px;"></div>
  <div class="bg-blob" style="width:400px;height:400px;background:#e8b4d2;bottom:-100px;right:-100px;--d:12s;--tx:-20px;--ty:-30px;"></div>
  <div class="bg-blob" style="width:300px;height:300px;background:#f5d4e8;top:40%;left:30%;--d:18s;--tx:40px;--ty:-20px;"></div>
</div>

<header class="hero">
  <p class="hero-day">día 20</p>
  <h1 class="hero-title">Una orquídea<br><em>hecha de palabras</em></h1>
  <p class="hero-sub">cada pétalo guarda algo que siento</p>
  <p class="hero-hint">toca cada pétalo para leerlo</p>
</header>

<div class="orchid-wrap">
  <svg class="orchid-svg" viewBox="0 0 400 480" xmlns="http://www.w3.org/2000/svg">

    <!-- Tallo -->
    <path d="M200,340 Q196,380 192,420 Q188,450 185,470" stroke="#c4609a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Hojas -->
    <path d="M193,415 Q170,408 158,393 Q150,380 157,370 Q165,361 178,368 Q190,376 193,395" fill="#c4a0b8" opacity="0.6"/>
    <path d="M191,435 Q212,430 222,416 Q229,404 222,395 Q214,387 203,393 Q193,400 191,418" fill="#c4a0b8" opacity="0.5"/>

    <!-- PÉTALO 1 — arriba -->
    <g class="petal" id="petal-0" onclick="selectPetal(0)">
      <ellipse cx="200" cy="240" rx="26" ry="52" fill="#7a2a5a" opacity="0.88"/>
      <ellipse cx="200" cy="240" rx="20" ry="44" fill="#c4609a" opacity="0.45"/>
      <text class="petal-num" x="200" y="235">1</text>
    </g>

    <!-- PÉTALO 2 — derecha arriba -->
    <g class="petal" id="petal-1" onclick="selectPetal(1)">
      <ellipse cx="200" cy="240" rx="26" ry="52" fill="#7a2a5a" opacity="0.88" transform="rotate(72 200 310)"/>
      <ellipse cx="200" cy="240" rx="20" ry="44" fill="#c4609a" opacity="0.45" transform="rotate(72 200 310)"/>
      <text class="petal-num" x="252" y="272" transform="rotate(72 252 272)">2</text>
    </g>

    <!-- PÉTALO 3 — derecha abajo -->
    <g class="petal" id="petal-2" onclick="selectPetal(2)">
      <ellipse cx="200" cy="240" rx="26" ry="52" fill="#7a2a5a" opacity="0.88" transform="rotate(144 200 310)"/>
      <ellipse cx="200" cy="240" rx="20" ry="44" fill="#c4609a" opacity="0.45" transform="rotate(144 200 310)"/>
      <text class="petal-num" x="228" y="352" transform="rotate(144 228 352)">3</text>
    </g>

    <!-- PÉTALO 4 — izquierda abajo -->
    <g class="petal" id="petal-3" onclick="selectPetal(3)">
      <ellipse cx="200" cy="240" rx="26" ry="52" fill="#7a2a5a" opacity="0.88" transform="rotate(216 200 310)"/>
      <ellipse cx="200" cy="240" rx="20" ry="44" fill="#c4609a" opacity="0.45" transform="rotate(216 200 310)"/>
      <text class="petal-num" x="172" y="352" transform="rotate(216 172 352)">4</text>
    </g>

    <!-- PÉTALO 5 — izquierda arriba -->
    <g class="petal" id="petal-4" onclick="selectPetal(4)">
      <ellipse cx="200" cy="240" rx="26" ry="52" fill="#7a2a5a" opacity="0.88" transform="rotate(288 200 310)"/>
      <ellipse cx="200" cy="240" rx="20" ry="44" fill="#c4609a" opacity="0.45" transform="rotate(288 200 310)"/>
      <text class="petal-num" x="148" y="272" transform="rotate(288 148 272)">5</text>
    </g>

    <!-- Centro -->
    <circle cx="200" cy="310" r="26" fill="#3a0a28"/>
    <circle cx="200" cy="310" r="18" fill="#8a3a6a"/>
    <circle cx="200" cy="310" r="10" fill="#f5d4e8"/>
    <circle cx="200" cy="310" r="4"  fill="#8a3a6a"/>

  </svg>
</div>

<div class="progress" id="progress">
  <div class="progress-dot" id="dot-0"></div>
  <div class="progress-dot" id="dot-1"></div>
  <div class="progress-dot" id="dot-2"></div>
  <div class="progress-dot" id="dot-3"></div>
  <div class="progress-dot" id="dot-4"></div>
</div>

<div class="phrase-panel" id="phrasePanel">
  <p class="phrase-hint" id="phraseHint">toca un pétalo para comenzar</p>
  <span class="phrase-num" id="phraseNum"></span>
  <div class="divider" id="phraseDivider" style="opacity:0;transition:opacity 0.4s;"></div>
  <h2 class="phrase-title" id="phraseTitle"></h2>
  <p class="phrase-text" id="phraseText"></p>
</div>

<div class="closing" id="closing">
  <div class="divider"></div>
  <p class="closing-text">
    Cada pétalo eres tú, Ame.<br>
    Y juntos forman algo que no tenía nombre<br>
    hasta que llegaste.
  </p>
  <p class="closing-firma">con todo — Victoria</p>
  <div class="bottom-deco">✿ ✿ ✿</div>
</div>

<script>
const petals = [
  {
    num: 'pétalo 1',
    title: 'Eres de las que aparecen una vez y lo cambian todo',
    text: 'Sin avisar, sin pedir permiso. Te escuché explicar algo con tanta pasión que tuve que pausar y simplemente admirarte. No sabía que me podía sorprender alguien así — y me sorprendiste completamente.'
  },
  {
    num: 'pétalo 2',
    title: 'Me devolviste algo que creía perdido',
    text: 'Las ganas de querer, de crear, de esperar cosas bonitas. Por ti quise programar, escribir poemas, buscar canciones que te definieran. Todo eso que estaba dormido volvió porque tú llegaste.'
  },
  {
    num: 'pétalo 3',
    title: 'Tus ojos se achinan cuando sonríes',
    text: 'Y eso me desordena completamente. Tu risa es deslumbrante. Y cuando te dan nervios te muerdes la lengua — y eso me encanta más de lo que sé explicar con palabras normales.'
  },
  {
    num: 'pétalo 4',
    title: 'Me escuchas como nadie me había escuchado',
    text: 'Guardas cosas que yo dije de pasada y las traes de vuelta en el momento exacto. Ser escuchada así es un regalo que no todo el mundo sabe dar. Tú sí sabes.'
  },
  {
    num: 'pétalo 5',
    title: 'Solo con saber que existes me siento viva',
    text: 'Antes necesitaba otras cosas para sentirme así. Ahora solo necesito saber que estás ahí, que mañana vas a escribirme. Contigo es suficiente. Tú eres suficiente.'
  }
];

const seen = new Set();

function selectPetal(i) {
  document.querySelectorAll('.petal').forEach((p, idx) => {
    p.classList.remove('active','dimmed');
    if (idx === i) p.classList.add('active');
    else p.classList.add('dimmed');
  });

  seen.add(i);
  document.getElementById('dot-' + i).classList.add('done');

  const panel = document.getElementById('phrasePanel');
  panel.classList.remove('active');
  document.getElementById('phraseHint').style.opacity = '0';
  document.getElementById('phraseDivider').style.opacity = '0';

  setTimeout(() => {
    document.getElementById('phraseNum').textContent   = petals[i].num;
    document.getElementById('phraseTitle').textContent = petals[i].title;
    document.getElementById('phraseText').textContent  = petals[i].text;
    document.getElementById('phraseDivider').style.opacity = '1';
    panel.classList.add('active');
    panel.scrollIntoView({ behavior:'smooth', block:'center' });
  }, 200);

  if (seen.size === petals.length) {
    setTimeout(() => {
      document.getElementById('closing').classList.add('visible');
      setTimeout(() => document.getElementById('closing').scrollIntoView({ behavior:'smooth', block:'center' }), 300);
    }, 800);
  }
}
</script>
</body>
</html>
