let bolsaDeFrases = [];

function barajarFrases() {
  bolsaDeFrases = [...afirmacionesOriginales];
  for (let i = bolsaDeFrases.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [bolsaDeFrases[i], bolsaDeFrases[j]] = [bolsaDeFrases[j], bolsaDeFrases[i]];
  }
}

barajarFrases();

const quoteEl = document.getElementById('quote');
const btnEl = document.getElementById('generate-btn');

btnEl.addEventListener('click', () => {
  quoteEl.classList.remove('fade-in');
  void quoteEl.offsetWidth; 
  
  if (bolsaDeFrases.length === 0) {
    barajarFrases();
  }
  
  const fraseSeleccionada = bolsaDeFrases.pop();
  quoteEl.textContent = fraseSeleccionada;
  quoteEl.classList.add('fade-in');
});
